# Docker Compose for Agora local development
# Usage: docker compose up -d
# Note: Requires agora/.env with POSTGRES_PASSWORD, REDIS_PASSWORD, APP_DOMAIN, ACME_EMAIL

services:
  # Traefik Reverse Proxy for HTTPS
  traefik:
    env_file:
      - ./agora/.env
    image: traefik:v2.11
    container_name: agora-traefik
    restart: unless-stopped
    command:
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      # Redirect HTTP to HTTPS
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      # Let's Encrypt
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:-admin@example.com}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt_data:/letsencrypt
    # --- ADDED THIS ENVIRONMENT BLOCK TO FORCE API VERSION 1.44 ---
    environment:
      - DOCKER_API_VERSION=1.45
    # -----------------------------------------------------------------
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik.rule=Host(`traefik.${APP_DOMAIN:-localhost}`)"
      - "traefik.http.routers.traefik.service=api@internal"
      - "traefik.http.routers.traefik.tls.certresolver=letsencrypt"

  # PostgreSQL Database
  postgres:
    image: postgres:17-alpine
    container_name: agora-postgres
    restart: unless-stopped
    env_file:
      - ./agora/.env
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: agora
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for sessions and Socket.IO adapter
  redis:
    image: redis:7-alpine
    container_name: agora-redis
    restart: unless-stopped
    env_file:
      - ./agora/.env
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Agora Nuxt Application
  agora:
    build:
      context: ./agora
    container_name: agora-app
    restart: unless-stopped
    expose:
      - "3000"
    env_file:
      - ./agora/.env
    environment:
      # Usage of service names 'postgres' and 'redis' for internal networking
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/agora?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      NUXT_REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      NUXT_PUBLIC_BASE_URL: /agora
      NUXT_APP_BASE_URL: /agora
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.agora.rule=PathPrefix(`/agora`)"
      - "traefik.http.routers.agora.entrypoints=websecure"
      - "traefik.http.routers.agora.tls.certresolver=letsencrypt"
      - "traefik.http.services.agora.loadbalancer.server.port=3000"

  # Adminer for database management (optional, comment out if not needed)
  adminer:
    image: adminer:latest
    container_name: agora-adminer
    restart: unless-stopped
    expose:
      - "8080"
    depends_on:
      - postgres
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.adminer.rule=PathPrefix(`/adminer`)"
      - "traefik.http.routers.adminer.entrypoints=websecure"
      - "traefik.http.routers.adminer.tls.certresolver=letsencrypt"
      - "traefik.http.services.adminer.loadbalancer.server.port=8080"

volumes:
  postgres_data:
  redis_data:
  letsencrypt_data:
